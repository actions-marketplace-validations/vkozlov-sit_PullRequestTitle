name: 'Normalize PR Title and Add Jira Link'
description: 'Automatically formats PR titles to Jira key format (PDD-123) and appends a Jira link to the PR body.'
author: 'your-github-username'

branding:
  icon: 'link'
  color: 'blue'

inputs:
  jira-issue-url:
    description: 'Base URL for Jira issues, e.g. https://yourcompany.atlassian.net/browse'
    required: true
  github-token:
    description: 'GitHub token with pull-requests: write permission'
    required: true
    default: '${{ github.token }}'

runs:
  using: 'node20'
  main: 'dist/index.js'
